models:
  - name: dim_listings_cleansed
    description: "Cleansed dimension table for Airbnb listings"
    data_tests:
      - minimum_row_count:
          arguments:
            min_row_count: 1000
    columns:
      - name: listing_id
        description: "Unique identifier (PK) for each listing"
        data_tests:
          - not_null
          - unique

      - name: host_id
        description: "Identifier for the host who owns the listing"
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_hosts_cleansed')
                field: host_id

      - name: room_type
        description: "Type of room available for booking"
        data_tests:
          - accepted_values:
              arguments:
                values: ['Entire home/apt',
                        'Private room',
                        'Shared room',
                        'Hotel room']
      
      - name: minimum_nights
        description: '{{ doc("dim_listing_cleansed__minimum_nights") }}'
        data_tests:
          - positive_values
  
  - name: dim_hosts_cleansed
    versions:
      - v: 1
        defined_in: dim_hosts_cleansed
        deprecation_date: 2030-01-01
      - v: 2
        columns:
          - include: '*'
            exclude: [host_name]
          - name: host_name
            description: "Name of the host (N/A if not available)"
            data_type: string
            constraints:
              - type: not_null

    latest_version: 2
    description: "Cleansed dimension table for Airbnb hosts"
    config:
      contract:
        enforced: true
    columns:
      - name: host_id
        description: "Unique identifier (PK) for each host"
        data_type: integer
        constraints:
          - type: not_null
        data_tests:
          - unique
      
      - name: host_name
        description: "Name of the host"
        data_type: string
        constraints:
          - type: not_null
      
      - name: is_superhost
        description: "Indicates if the host is a superhost"
        data_type: string
        data_tests:
          - accepted_values:
              arguments:
                values: ['t', 'f']
      
      - name: created_at
        description: "Timestamp when the host profile was created"
        data_type: timestamp
        data_tests:
          - not_null
      
      - name: updated_at
        description: "Timestamp when the host profile was last updated"
        data_type: timestamp
        data_tests:
          - not_null
  
  - name: dim_listings_w_hosts
    tests:
      - dbt_expectations.expect_table_row_count_to_equal_other_table:
          compare_model: source('airbnb', 'listings')
    columns:
      - name: price_usd
        description: "Price of the listing in USD"
        data_type: decimal
        tests:
          - dbt_expectations.expect_column_values_to_be_of_type:
              column_type: number
          - dbt_expectations.expect_column_median_to_be_between:
              min_value: 50
              max_value: 500
          - dbt_expectations.expect_column_max_to_be_between:
              max_value: 100000
              config:
                severity: warn


  - name: fct_reviews
    columns:
      - name: listing_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_listings_cleansed')
                field: listing_id

      - name: review_date
        data_tests:
          - not_null
      
      - name: review_text
        data_tests:
          - not_null
      
      - name: review_sentiment
        data_tests:
          - accepted_values:
              arguments:
                values: ['positive', 'negative', 'neutral']
      